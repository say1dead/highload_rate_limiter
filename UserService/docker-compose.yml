version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: usersdb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dadada
      POSTGRES_DB: usersdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d usersdb || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - usersdb-data:/var/lib/postgresql/data
      - ./Database:/docker-entrypoint-initdb.d:ro

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: db_tnsod
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: kochurko4urov@yandex.ru
      PGADMIN_DEFAULT_PASSWORD: dadada
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  usersdb-data:
